# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Animations Configuration                 ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# https://wiki.hyprland.org/Configuring/Animations/

animations {
    enabled = true

    # Snappy bezier curves
    bezier = snappy, 0.2, 1.0, 0.3, 1.0
    bezier = smooth, 0.4, 0.0, 0.2, 1.0
    bezier = quick, 0.0, 0.0, 0.2, 1.0

    # Window animations - fast and responsive
    animation = windows, 1, 3, snappy, slide
    animation = windowsIn, 1, 3, snappy, slide
    animation = windowsOut, 1, 2, quick, popin 80%
    animation = windowsMove, 1, 3, snappy

    # Fade animations
    animation = fade, 1, 3, smooth
    animation = fadeIn, 1, 3, smooth
    animation = fadeOut, 1, 2, quick

    # Border color animation
    animation = border, 1, 4, smooth
    animation = borderangle, 0

    # Workspace animations - snappy slide
    animation = workspaces, 1, 3, snappy, slide
}
