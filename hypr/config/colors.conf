# Primary accent - warm orange
$accent = rgba(e07a5fff)
$accent_dim = rgba(d4a574ff)

# Backgrounds
$bg_dark = rgba(1a1a1aff)
$bg_mid = rgba(262626ff)
$bg_light = rgba(333333ff)

# Foregrounds
$fg = rgba(a3a3a3ff)
$fg_bright = rgba(f0f0f0ff)
$fg_dim = rgba(525252ff)

# Semantic colors
$red = rgba(ef4444ff)
$green = rgba(81b29aff)
$yellow = rgba(d4a574ff)

# Legacy aliases (for compatibility)
$cachylgreen = $accent
$cachymgreen = $accent_dim
$cachydgreen = $bg_light
$cachylblue = $fg_bright
$cachymblue = $bg_mid
$cachydblue = $bg_dark
$cachywhite = $fg_bright
$cachygrey = $fg
$cachygray = $fg_dim
