# ┃                      Input Configuration                    ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Input wiki https://wiki.hyprland.org/Configuring/Variables/#input

input {
    follow_mouse = 2 # 0|1|2|3
    float_switch_override_focus = 2
    kb_layout = dk
    kb_options = caps:super

    # Pointer speed (-1.0 to 1.0), higher = faster
    sensitivity = 0.3

    # Acceleration profile: adaptive (like macOS) or flat (raw input)
    accel_profile = adaptive

    touchpad {
        natural_scroll = true
        # Disable while typing
        disable_while_typing = true
        # Tap to click
        tap-to-click = true
        # Drag with tap-and-hold
        drag_lock = false
        # Scroll speed multiplier
        scroll_factor = 0.5
        # Click methods
        clickfinger_behavior = true
    }
}

