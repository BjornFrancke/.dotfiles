# Hyprlock config - Claude Code Theme

general {
    hide_cursor = true
    grace = 5
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
}

input-field {
    monitor =
    size = 250, 40
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgb(51, 51, 51)
    inner_color = rgb(26, 26, 26)
    font_color = rgb(163, 163, 163)
    fade_on_empty = false
    placeholder_text = <i>password...</i>
    hide_input = false
    check_color = rgb(224, 122, 95)
    fail_color = rgb(239, 68, 68)
    fail_text = <i>$FAIL</i>
    capslock_color = rgb(212, 165, 116)
    position = 0, -50
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(224, 122, 95)
    font_size = 64
    font_family = MesloLGS Nerd Font
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = rgb(163, 163, 163)
    font_size = 16
    font_family = MesloLGS Nerd Font
    position = 0, 30
    halign = center
    valign = center
}
