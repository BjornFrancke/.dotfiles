# ========================================
# TMUX CONFIGURATION
# ========================================
# Modern, beautiful, and easy-to-use tmux setup
# Designed to complement your nvim workflow
#
# Installation:
# 1. ln -s ~/dotfiles/tmux/tmux.conf ~/.tmux.conf
# 2. Install TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# 3. Press prefix + I to install plugins
#
# Quick Reference:
# - Prefix: Ctrl+a (instead of Ctrl+b)
# - New window: Ctrl+a c
# - Split vertical: Ctrl+a |
# - Split horizontal: Ctrl+a -
# - Navigate panes: Ctrl+h/j/k/l
# - Resize panes: Prefix + H/J/K/L
# - Choose session: Prefix + s
# ========================================

# ========================================
# GENERAL SETTINGS
# ========================================

# Change prefix from Ctrl+b to Ctrl+a (easier to reach)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Enable mouse support (click to select pane, resize, etc.)
set -g mouse on

# Start window and pane numbering at 1 (not 0)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 50000

# Display messages for 4 seconds
set -g display-time 4000

# Refresh status bar every 5 seconds
set -g status-interval 5

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# Auto-rename windows with Nerd Font icons based on running process
set-option -g allow-rename off
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{?#{==:#{pane_current_command},nvim}, nvim,#{?#{==:#{pane_current_command},vim}, vim,#{?#{==:#{pane_current_command},node}, node,#{?#{==:#{pane_current_command},python3}, python3,#{?#{==:#{pane_current_command},python}, python,#{?#{==:#{pane_current_command},git}, git,#{?#{==:#{pane_current_command},lazygit}, lazygit,#{?#{==:#{pane_current_command},ssh}, ssh,#{?#{==:#{pane_current_command},docker}, docker,#{?#{==:#{pane_current_command},cargo}, cargo,#{?#{==:#{pane_current_command},ruby}, ruby,#{?#{==:#{pane_current_command},go}, go,#{?#{==:#{pane_current_command},make}, make,#{?#{==:#{pane_current_command},zsh}, zsh,#{?#{==:#{pane_current_command},bash}, bash,#{?#{m:[0-9]*.*,#{pane_current_command}},󱚣 claude, #{pane_current_command}}}}}}}}}}}}}}}}}'

# Terminal capabilities (tmux-256color for undercurl, italic, strikethrough in nvim)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -as terminal-features ',xterm-256color:RGB'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ========================================
# KEY BINDINGS
# ========================================

# Reload config file
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes using | and - (more intuitive than % and ")
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Create new window in current path
bind c new-window -c "#{pane_current_path}"

# Navigate panes with vim-like keys (without prefix!)
# This is smart - if vim is running, it sends the key to vim instead
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"

# Navigate panes with prefix (backup method)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim-like keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Navigate windows
bind -r C-h previous-window
bind -r C-l next-window

# Move windows
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Quick window selection
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Toggle pane zoom
bind -n M-z resize-pane -Z

# Kill pane without confirmation
bind x kill-pane

# Kill window
bind X kill-window

# Better copy mode
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi Escape send-keys -X cancel

# Paste
bind p paste-buffer

# Quick session switcher
bind C-j display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"

# ========================================
# VISUAL DESIGN (AYU DARK THEME)
# ========================================

# Status bar position
set-option -g status-position top

# Status bar style
set -g status-style bg=#0F131A,fg=#CCCAC2

# Window status style
# Window status (inactive) — rounded pill shape
setw -g window-status-style fg=#6C7380,bg=#0F131A
setw -g window-status-format '#[fg=#1F2430,bg=#0F131A]#[fg=#6C7380,bg=#1F2430] #I:#W#{?window_zoomed_flag, ,}#{?window_bell_flag, ,}#{?window_activity_flag, ,} #[fg=#1F2430,bg=#0F131A]'

# Active window status — cyan rounded pill
setw -g window-status-current-style fg=#0F131A,bg=#5CCFE6,bold
setw -g window-status-current-format '#[fg=#5CCFE6,bg=#0F131A]#[fg=#0F131A,bg=#5CCFE6,bold] #I:#W#{?window_zoomed_flag, ,} #[fg=#5CCFE6,bg=#0F131A]'

# Window separator
setw -g window-status-separator ' '

# Pane border style — blue accent surrounds the active pane
set -g pane-border-style fg=#1F2430
set -g pane-active-border-style fg=#5CCFE6
set -g pane-border-lines heavy
set -g pane-border-indicators arrows
set -g pane-border-status top
set -g pane-border-format '#{?pane_active,#[fg=#5CCFE6#,bg=#0F131A]━,#[fg=#1F2430#,bg=#0F131A]─}'

# Dim inactive panes to clearly show which pane is active
set -g window-style 'fg=#6C7380,bg=#0B0E14'
set -g window-active-style 'fg=#CCCAC2,bg=#0F131A'

# Message style
set -g message-style bg=#5CCFE6,fg=#0F131A,bold

# Command message style
set -g message-command-style bg=#FFCC66,fg=#0F131A

# Mode style (copy mode, etc.)
setw -g mode-style bg=#5CCFE6,fg=#0F131A

# Clock mode style
setw -g clock-mode-colour #5CCFE6
setw -g clock-mode-style 24

# ========================================
# STATUS BAR
# ========================================

# Left side: Session name (rounded pill)
set -g status-left-length 50
set -g status-left '#[fg=#0F131A,bg=#5CCFE6,bold] #S #[fg=#5CCFE6,bg=#0F131A]'

# Right side: Battery + Date + Time (rounded pills)
set -g status-right-length 150
set -g status-right '#{?client_prefix,#[fg=#FFCC66#,bg=#0F131A]#[fg=#0F131A#,bg=#FFCC66#,bold] PREFIX #[fg=#FFCC66#,bg=#0F131A] ,}#[fg=#1F2430,bg=#0F131A]#[fg=#6C7380,bg=#1F2430] 󰁹 #(pmset -g batt | grep -Eo "[0-9]+%%" | head -1) #[fg=#1F2430,bg=#0F131A] #[fg=#1F2430,bg=#0F131A]#[fg=#CCCAC2,bg=#1F2430] %b %d #[fg=#1F2430,bg=#0F131A] #[fg=#5CCFE6,bg=#0F131A]#[fg=#0F131A,bg=#5CCFE6,bold] %H:%M #[fg=#5CCFE6,bg=#0F131A]'

# Center: Window list
set -g status-justify absolute-centre

# ========================================
# PLUGINS (TPM - Tmux Plugin Manager)
# ========================================

# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Sensible defaults
set -g @plugin 'tmux-plugins/tmux-sensible'

# Better mouse support
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @scroll-speed-num-lines-per-scroll 3

# Copy to system clipboard
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_selection_mouse 'clipboard'

# Persist sessions across reboots
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# Auto-save sessions
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Display pane numbers for quick navigation
set -g @plugin 'tmux-plugins/tmux-pain-control'

# Prefix highlight is handled natively via #{?client_prefix} in status-right

# ========================================
# INITIALIZE PLUGIN MANAGER
# ========================================
# Keep this line at the very bottom of tmux.conf

run '~/.tmux/plugins/tpm/tpm'
